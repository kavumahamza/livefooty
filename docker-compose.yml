version: "3.9"

# -----------------------------------------------------------------------
# Football Live — four-service stack
#
# ONE-POLLER INVARIANT: the `poller` service must always run as exactly
# ONE replica.  Scaling `backend-web` (e.g. --scale backend-web=4) is
# safe because each web replica is stateless.  NEVER scale the poller:
#
#   docker compose up --scale backend-web=4   ✓ safe
#   docker compose up --scale poller=2        ✗ BREAKS the API budget
#
# The leader-lock in run_poller is a backstop but the primary control
# is keeping deploy replicas=1 for this service.
# -----------------------------------------------------------------------

x-backend-env: &backend-env
  PROVIDER: ${PROVIDER:-mock}
  API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  POLL_INTERVAL: ${POLL_INTERVAL:-20}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}

services:

  redis:
    image: redis:alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-web:
    build: ./backend
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on:
      redis:
        condition: service_healthy
    # CMD from Dockerfile: gunicorn footy.wsgi:application --bind 0.0.0.0:8000 --workers 3
    # Not exposed to host — nginx proxies /api/ to this service internally.

  poller:
    build: ./backend
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on:
      redis:
        condition: service_healthy
    # Override the default gunicorn CMD — run exactly ONE long-lived poller.
    # CRITICAL: do NOT scale this service (see invariant note above).
    command: ["python", "manage.py", "run_poller"]
    # deploy.replicas is set explicitly so accidental --scale is a visible
    # config conflict rather than a silent override.
    deploy:
      replicas: 1

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend-web
    # nginx serves the SPA on / and reverse-proxies /api/ to backend-web:8000
