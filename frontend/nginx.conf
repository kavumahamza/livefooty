server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any path not matching a real file serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy /api/ to the backend-web service (same-origin for the SPA)
    location /api/ {
        proxy_pass http://backend-web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # No SSE — plain REST polling; buffering is fine (default on).
    }
}
